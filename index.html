<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Prototype site</title>
    <style>
        :root {
            --bg-color: #E6E6E6;
            --sidebar-border: #BDBDBD;
            
            --btn-bg: #D1D1D1;
            --btn-hover: #C5C5C5; 
            
            --input-bg: #CFCFCF;
            --input-icon-bg: #B8B8B8;
            --input-icon-hover: #A8A8A8;
            
            --text-dark: #222222;
            --text-gray: #5E5E5E;
            --text-light-gray: #8A8A8A;
            
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "Courier New", Courier, monospace;
            
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            animation: fadeIn 0.6s ease-in-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100%;
            border-right: 1px dashed var(--sidebar-border);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            flex-shrink: 0;
            position: relative;
            z-index: 20;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .nav-btn {
            background-color: var(--btn-bg);
            border: none;
            height: 40px;
            margin-right: 32px;
            border-radius: 0 20px 20px 0;
            display: flex;
            align-items: center;
            padding: 0 20px 0 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .nav-btn.active {
            background-color: #B0B0B0;
            border-left: 4px solid #555;
        }

        .nav-btn:hover {
            background-color: var(--btn-hover);
            transform: translateX(4px);
        }

        .nav-btn:active {
            transform: scale(0.98) translateX(2px);
            transition: all 0.1s ease;
        }

        .nav-btn-icon {
            width: 32px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: auto;
        }

        .nav-btn-text {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-dark);
        }

        .badge-new {
            background-color: #333;
            color: #E6E6E6;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
            letter-spacing: 0.5px;
        }

        .recents-section {
            padding: 0 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .recents-title {
            font-size: 15px;
            color: var(--text-gray);
            margin-bottom: 12px;
            font-weight: 400;
        }

        .profile-section {
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.2s ease;
            user-select: none;
        }

        .profile-section:hover {
            transform: translateY(-2px);
        }

        .profile-section:active {
            transform: translateY(0);
        }

        .avatar {
            width: 32px;
            height: 32px;
            background-color: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #E6E6E6;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
        }

        .profile-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .profile-plan {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-dark);
            margin-top: 2px;
        }
        
        .profile-plan span {
            text-decoration: underline;
        }

        .profile-popup {
            position: absolute;
            bottom: 80px;
            left: 20px;
            width: 220px;
            background-color: var(--bg-color);
            border: 1px solid var(--sidebar-border);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-popup.active {
            display: flex;
        }

        .popup-item {
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dark);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popup-item:hover {
            background-color: var(--btn-bg);
        }

        .popup-divider {
            height: 1px;
            background-color: var(--sidebar-border);
            margin: 4px 0;
            opacity: 0.5;
        }

        .main-area {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .page-view {
            display: none; 
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 24px;
            animation: fadeIn 0.4s ease-in-out;
        }

        .page-view.active {
            display: flex;
        }

        .top-upgrade-btn {
            background-color: var(--btn-bg);
            border: none;
            border-radius: 16px;
            padding: 6px 16px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-gray);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            transition: all 0.3s ease;
        }

        .top-upgrade-btn:hover {
            background-color: var(--btn-hover);
            transform: translateX(-50%) scale(1.02);
            color: var(--text-dark);
        }
        
        .top-upgrade-btn:active {
            transform: translateX(-50%) scale(0.98);
        }

        .top-upgrade-btn span.underline {
            text-decoration: underline;
        }

        .dot {
            width: 4px;
            height: 4px;
            background-color: var(--text-light-gray);
            border-radius: 50%;
        }

        .btn-back {
            position: absolute;
            top: 24px;
            left: 32px;
            background-color: var(--btn-bg);
            border: none;
            border-radius: 16px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .btn-back:hover {
            background-color: var(--btn-hover);
            transform: translateX(-2px);
        }

        .btn-back:active {
            transform: translateX(0) scale(0.95);
        }

        .empty-page-content {
            margin-top: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-gray);
        }

        .empty-page-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 680px;
            flex-grow: 1;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .center-star {
            width: 64px;
            height: 64px;
            margin-bottom: 24px;
        }

        .greeting {
            font-size: 20px;
            color: var(--text-gray);
            font-weight: 400;
            margin-bottom: 32px;
            text-align: center;
        }

        .chat-history {
            width: 100%;
            max-width: 680px;
            flex-grow: 1;
            display: none;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            padding-top: 60px;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-history::-webkit-scrollbar-thumb { background: #BDBDBD; border-radius: 4px; }

        .chat-message {
            padding: 16px 20px;
            border-radius: 16px;
            max-width: 85%;
            font-size: 14.5px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
            word-wrap: break-word;
        }

        .chat-message.user {
            background-color: var(--input-bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: var(--text-dark);
        }

        .input-container {
            width: 100%;
            max-width: 680px;
            background-color: var(--input-bg);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 110px;
            position: relative;
            transform: translateY(-80px);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            border: 1px solid transparent;
            margin-top: auto;
            flex-shrink: 0;
        }

        .input-container.chat-active {
            transform: translateY(0);
        }

        .input-container:focus-within {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            border-color: #BDBDBD;
        }

        .main-textarea {
            width: 100%;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-gray);
            line-height: 1.5;
            height: 45px;
            margin-bottom: 12px;
        }

        .main-textarea::placeholder {
            color: var(--text-light-gray);
        }

        .input-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-controls {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: var(--input-icon-bg);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-dark);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .icon-btn:hover { background-color: var(--input-icon-hover); transform: scale(1.1); }
        .icon-btn:active { transform: scale(0.95); }

        .enhance-btn {
            width: auto;
            padding: 0 10px;
            border-radius: 14px;
            background-color: var(--input-icon-bg);
            border: none;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.2s ease;
        }

        .enhance-btn:hover { background-color: var(--input-icon-hover); transform: scale(1.05); }
        .enhance-btn:active { transform: scale(0.95); }

        .send-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #E6E6E6;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .send-btn svg { fill: var(--text-gray); }
        .send-btn:hover { background-color: #FFFFFF; transform: translateY(-2px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .send-btn:active { transform: translateY(0) scale(0.95); }

        .svg-icon {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--text-dark);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
    
    <!-- Подключение библиотеки Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        
        const app = {
            views: document.querySelectorAll('.page-view'),
            navBtns: document.querySelectorAll('.nav-btn'),
            profileBtn: document.getElementById('profileBtn'),
            profilePopup: document.getElementById('profilePopup'),
            
            textarea: document.getElementById('mainTextarea'),
            sendBtn: document.getElementById('sendBtn'),
            enhanceBtn: document.getElementById('enhanceBtn'),
            welcomeScreen: document.getElementById('welcomeScreen'),
            chatHistory: document.getElementById('chatHistory'),
            inputContainer: document.getElementById('inputContainer'),

          init() {
                this.bindEvents();
                this.loadMockData(); 
                this.loadRealUpdates(); // Запускаем загрузку реальных новостей из базы
            },

            bindEvents() {
                // ... тут твой старый код bindEvents, его не трогаем ...
            },

            switchView(viewId) {
                // ... тут твой старый код switchView, его не трогаем ...
            },

            // Очистили эту функцию от старого хардкода обновлений
            loadMockData() {
                // Проекты
                document.getElementById('view-projects').innerHTML = `
                    <button class="btn-back" onclick="app.switchView('home')">← Назад</button>
                    <div class="empty-page-content" style="margin-top: 60px; text-align: left; width: 100%; max-width: 600px;">
                        <div class="empty-page-title">Мои Проекты</div>
                        <p style="color: #5E5E5E; margin-bottom: 20px;">Здесь будут храниться ваши рабочие пространства.</p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;">
                            <div style="border: 2px dashed #BDBDBD; padding: 20px; border-radius: 16px; text-align: center; cursor: pointer;">
                                <span style="font-size: 24px;">+</span><br><b>Создать проект</b>
                            </div>
                            <div style="background: #CFCFCF; padding: 20px; border-radius: 16px;">
                                <h3>Apex Prototype</h3>
                                <p style="font-size: 12px; color: #5E5E5E; margin-top: 5px;">Текущий активный проект ИИ-ассистента. Подключен к Supabase.</p>
                            </div>
                        </div>
                    </div>
                `;

                // Артефакты
                document.getElementById('view-artifacts').innerHTML = `
                    <button class="btn-back" onclick="app.switchView('home')">← Назад</button>
                    <div class="empty-page-content" style="margin-top: 60px; text-align: left; width: 100%; max-width: 500px;">
                        <div class="empty-page-title">Артефакты (Генерации)</div>
                        <p style="color: #5E5E5E; margin-bottom: 15px;">Сюда складываются сгенерированные ИИ файлы, куски кода и документы.</p>
                        <div style="background: #CFCFCF; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; width: 100%;">
                            // Пока тут пусто, но скоро здесь будут скрипты!
                        </div>
                    </div>
                `;
            },

            // НОВАЯ ФУНКЦИЯ: Тянет данные прямиком из Supabase
            async loadRealUpdates() {
                const container = document.getElementById('view-updates');
                
                // Пока данные подгружаются, покажем красивый лоадер
                container.innerHTML = `
                    <button class="btn-back" onclick="app.switchView('home')">← Назад</button>
                    <div class="empty-page-content" style="margin-top: 60px; max-width: 500px; text-align: left;">
                        <div class="empty-page-title">Журнал обновлений</div>
                        <p style="color: #5E5E5E;">Загрузка данных из базы...</p>
                    </div>
                `;

                try {
                    // Делаем запрос к таблице 'updates' и сортируем по дате (свежие вверху)
                    const { data: updates, error } = await supabaseClient
                        .from('updates')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) throw error;

                    // Начинаем собирать HTML
                    let htmlContent = `
                        <button class="btn-back" onclick="app.switchView('home')">← Назад</button>
                        <div class="empty-page-content" style="margin-top: 60px; max-width: 500px; text-align: left;">
                            <div class="empty-page-title">Журнал обновлений (${updates[0]?.version || 'v1.0'})</div>
                    `;

                    // Циклом перебираем все строки из базы и превращаем в карточки
                    updates.forEach(item => {
                        const date = new Date(item.created_at).toLocaleDateString('ru-RU');
                        htmlContent += `
                            <div style="background: #CFCFCF; padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%;">
                                <strong style="color: #222;">${item.version} — ${item.title}</strong><br>
                                <span style="font-size: 12px; color: #5E5E5E;">${date}</span>
                                <p style="margin-top: 5px; font-size: 13px;">${item.description}</p>
                            </div>
                        `;
                    });

                    htmlContent += `</div>`;
                    container.innerHTML = htmlContent;

                } catch (error) {
                    console.error('Ошибка бэкенда:', error);
                    container.innerHTML = `
                        <button class="btn-back" onclick="app.switchView('home')">← Назад</button>
                        <div class="empty-page-content" style="margin-top: 60px; max-width: 500px; text-align: left;">
                            <div class="empty-page-title" style="color: red;">Ошибка загрузки</div>
                            <p>Не удалось подключиться к Supabase: ${error.message}</p>
                        </div>
                    `;
                }
            },

            
            async handleLocalMessage() {
                const text = this.textarea.value.trim();
                if (!text) return;

                if (this.welcomeScreen.style.display !== 'none') {
                    this.welcomeScreen.style.display = 'none';
                    this.chatHistory.style.display = 'flex';
                    this.inputContainer.classList.add('chat-active');
                }

                this.textarea.value = '';
                this.textarea.style.height = '45px';

                
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-message user';
                msgDiv.textContent = text; 
                this.chatHistory.appendChild(msgDiv);
                this.chatHistory.scrollTop = this.chatHistory.scrollHeight;

                const aiMsgDiv = document.createElement('div');
                aiMsgDiv.className = 'chat-message'; 
                aiMsgDiv.style.background = '#FFFFFF'; 
                aiMsgDiv.textContent = 'Думаю...';
                this.chatHistory.appendChild(aiMsgDiv);
                this.chatHistory.scrollTop = this.chatHistory.scrollHeight;

                try {
      
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });
                    
                    if (!response.ok) throw new Error('Локальный сервер не найден');
                    const data = await response.json();
                    aiMsgDiv.textContent = data.reply;

                } catch (error) {
              
                    setTimeout(() => {
                        let lowerText = text.toLowerCase();
                        if (lowerText.includes('нахуй') || lowerText.includes('блять')) {
                            aiMsgDiv.textContent = "Сам иди нахуй! Ладно, шучу. Я пока работаю в тестовом автономном режиме, так как сервер /api/chat еще не запущен. Но твой интерфейс работает идеально!";
                        } else if (lowerText.includes('привет')) {
                            aiMsgDiv.textContent = "Привет! Я твой локальный ИИ-ассистент. Твой фронтенд готов, база Supabase подключена, кнопки работают!";
                        } else {
                            aiMsgDiv.textContent = `Я принял твой запрос: "${text}". Настоящий искусственный интеллект подключится, когда мы развернем бэкенд-сервер на Vercel или добавим API-ключ Gemini/OpenAI!`;
                        }
                        this.chatHistory.scrollTop = this.chatHistory.scrollHeight;
                    }, 1000); 
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
